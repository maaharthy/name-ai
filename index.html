<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اعرف معنى اسمك بالذكاء الاصطناعي</title>

<style>
body{
    font-family: Tahoma, Arial, sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1a73e8;
}

.desc{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    font-size:18px;
    border:1px solid #ddd;
    border-radius:12px;
}

button{
    padding:14px 25px;
    border:none;
    background:#1a73e8;
    color:white;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

#result{
    margin-top:25px;
}

.card{
    background:#fafafa;
    padding:20px;
    border-radius:15px;
    border:1px solid #eee;
}

.card p{
    line-height:1.9;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

    <h1>اعرف معنى اسمك بالذكاء الاصطناعي</h1>

    <p class="desc">
        أدخل أي اسم لمعرفة معناه وأصله وانتشاره وطريقة كتابته بالإنجليزية.
    </p>

    <div class="search-box">
        <input id="name" type="text" placeholder="مثال: إليانا">
        <button onclick="searchName()">بحث</button>
    </div>

    <div id="result"></div>

</div>

<script>
async function searchName() {

    const name = document.getElementById("name").value.trim();

    if (!name) {
        alert("اكتب الاسم أولاً");
        return;
    }

    const api =
    "https://script.google.com/macros/s/AKfycbxUpyDGEFE1wV5QzRsKlcJFsyGNDqw8LRGwyGJGYY3eS-xWd2k-Mv6mRDZ_R8wnSGWP/exec?name="
    + encodeURIComponent(name);

    try {

        document.getElementById("result").innerHTML =
        "<p>جاري البحث...</p>";

        const response = await fetch(api);
        const data = await response.json();

        if(data.error){
            document.getElementById("result").innerHTML =
            "<div class='card'>الاسم غير موجود في قاعدة البيانات.</div>";
            return;
        }

        document.getElementById("result").innerHTML = `
        <div class="card">
            <h2>${name}</h2>

            <p><b>📖 المعنى:</b> ${data.meaning || "-"}</p>

            <p><b>🌍 الأصل:</b> ${data.origin || "-"}</p>

            <p><b>📈 الانتشار:</b> ${data.popularity || "-"}</p>

            <p><b>🔤 الإنجليزية:</b> ${data.english || "-"}</p>

            <p><b>⭐ الشخصيات المشهورة:</b> ${data.celebrities || "-"}</p>

            <p><b>🧩 أسماء مشابهة:</b> ${data.similar || "-"}</p>
        </div>
        `;

    } catch(error) {

        document.getElementById("result").innerHTML =
        "<div class='card'>حدث خطأ أثناء الاتصال بالخادم.</div>";

        console.log(error);
    }
}
</script>

</body>
</html>
